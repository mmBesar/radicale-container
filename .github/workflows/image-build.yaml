name: Build and Publish Container Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/image-build.yaml'
      - 'UPSTREAM_VERSION'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/mmbesar/radicale

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout main (Dockerfile)
        uses: actions/checkout@v6
        with:
          ref: main
          path: main

      - name: Checkout upstream (source)
        uses: actions/checkout@v6
        with:
          ref: upstream
          path: upstream

      - name: Read upstream version
        id: version
        run: |
          VERSION=$(cat main/UPSTREAM_VERSION 2>/dev/null || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$(echo "$VERSION" | grep -oE '^v[0-9]+')" >> $GITHUB_OUTPUT
          echo "minor=$(echo "$VERSION" | grep -oE '^v[0-9]+\.[0-9]+')" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Get upstream commit SHA
        id: sha
        run: |
          cd upstream
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }}
        uses: docker/build-push-action@v7
        with:
          context: ./upstream
          file: ./main/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.minor }}-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}-${{ matrix.arch }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
            VCS_REF=${{ steps.sha.outputs.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:cache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:cache-${{ matrix.arch }},mode=max

  manifest:
    name: Create Multi-Arch Manifest
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      packages: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          path: main

      - name: Read upstream version
        id: version
        run: |
          VERSION=$(cat main/UPSTREAM_VERSION 2>/dev/null || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$(echo "$VERSION" | grep -oE '^v[0-9]+')" >> $GITHUB_OUTPUT
          echo "minor=$(echo "$VERSION" | grep -oE '^v[0-9]+\.[0-9]+')" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create manifest — latest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:latest-amd64 \
            ${{ env.IMAGE_NAME }}:latest-arm64

      - name: Create manifest — ${{ steps.version.outputs.version }}
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} \
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-amd64 \
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-arm64

      - name: Create manifest — ${{ steps.version.outputs.minor }}
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.minor }} \
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.minor }}-amd64 \
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.minor }}-arm64

      - name: Create manifest — ${{ steps.version.outputs.major }}
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }} \
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}-amd64 \
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}-arm64
