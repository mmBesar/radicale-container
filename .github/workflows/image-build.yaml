name: Build and Publish Container Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/image-build.yaml'
      - 'UPSTREAM_VERSION'
      - 'UPSTREAM_MASTER_SHA'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/mmbesar/radicale

jobs:
  prepare:
    name: Prepare Build Context
    runs-on: ubuntu-24.04
    outputs:
      build_stable: ${{ steps.check.outputs.build_stable }}
      build_dev: ${{ steps.check.outputs.build_dev }}
      version: ${{ steps.check.outputs.version }}
      major: ${{ steps.check.outputs.major }}
      minor: ${{ steps.check.outputs.minor }}
      build_date: ${{ steps.check.outputs.build_date }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 2

      - name: Determine what to build
        id: check
        run: |
          VERSION=$(cat UPSTREAM_VERSION 2>/dev/null || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$(echo "$VERSION" | grep -oE '^v[0-9]+')" >> $GITHUB_OUTPUT
          echo "minor=$(echo "$VERSION" | grep -oE '^v[0-9]+\.[0-9]+')" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

          # On workflow_dispatch or Dockerfile/workflow changes — build everything
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build_stable=true" >> $GITHUB_OUTPUT
            echo "build_dev=true" >> $GITHUB_OUTPUT
            echo "Triggered manually — building both stable and dev"
            exit 0
          fi

          # Check which files changed in this push
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "Changed files: $CHANGED"

          BUILD_STABLE=false
          BUILD_DEV=false

          # Dockerfile or workflow changed — rebuild everything
          if echo "$CHANGED" | grep -qE '^(Dockerfile|\.github/workflows/image-build\.yaml)$'; then
            BUILD_STABLE=true
            BUILD_DEV=true
          fi

          # UPSTREAM_VERSION changed — stable (and dev for consistency)
          if echo "$CHANGED" | grep -q "UPSTREAM_VERSION"; then
            BUILD_STABLE=true
            BUILD_DEV=true
          fi

          # Only UPSTREAM_MASTER_SHA changed — dev only
          if echo "$CHANGED" | grep -q "UPSTREAM_MASTER_SHA"; then
            BUILD_DEV=true
          fi

          echo "build_stable=$BUILD_STABLE" >> $GITHUB_OUTPUT
          echo "build_dev=$BUILD_DEV" >> $GITHUB_OUTPUT
          echo "Will build stable: $BUILD_STABLE — dev: $BUILD_DEV"

  build:
    name: Build ${{ matrix.flavor }}/${{ matrix.arch }}
    needs: prepare
    if: |
      (matrix.flavor == 'stable' && needs.prepare.outputs.build_stable == 'true') ||
      (matrix.flavor == 'dev'    && needs.prepare.outputs.build_dev    == 'true')
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        flavor: [stable, dev]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout main (Dockerfile)
        uses: actions/checkout@v6
        with:
          ref: main
          path: main

      - name: Checkout upstream source — stable
        if: matrix.flavor == 'stable'
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.version }}
          path: upstream

      - name: Checkout upstream source — dev
        if: matrix.flavor == 'dev'
        uses: actions/checkout@v6
        with:
          ref: upstream
          path: upstream

      - name: Get upstream commit SHA
        id: sha
        run: |
          cd upstream
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push — stable/${{ matrix.arch }}
        if: matrix.flavor == 'stable'
        uses: docker/build-push-action@v7
        with:
          context: ./upstream
          file: ./main/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.minor }}-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.major }}-${{ matrix.arch }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            VCS_REF=${{ steps.sha.outputs.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:cache-stable-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:cache-stable-${{ matrix.arch }},mode=max

      - name: Build and push — dev/${{ matrix.arch }}
        if: matrix.flavor == 'dev'
        uses: docker/build-push-action@v7
        with:
          context: ./upstream
          file: ./main/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:dev-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:master-${{ matrix.arch }}
          build-args: |
            VERSION=dev
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            VCS_REF=${{ steps.sha.outputs.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:cache-dev-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:cache-dev-${{ matrix.arch }},mode=max

  manifest:
    name: Manifest — ${{ matrix.flavor }}
    needs: [prepare, build]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-24.04
    permissions:
      packages: write

    strategy:
      fail-fast: false
      matrix:
        flavor: [stable, dev]

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create manifests — stable
        if: matrix.flavor == 'stable' && needs.prepare.outputs.build_stable == 'true'
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          MINOR=${{ needs.prepare.outputs.minor }}
          MAJOR=${{ needs.prepare.outputs.major }}

          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:latest-amd64 \
            ${{ env.IMAGE_NAME }}:latest-arm64

          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:$VERSION \
            ${{ env.IMAGE_NAME }}:$VERSION-amd64 \
            ${{ env.IMAGE_NAME }}:$VERSION-arm64

          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:$MINOR \
            ${{ env.IMAGE_NAME }}:$MINOR-amd64 \
            ${{ env.IMAGE_NAME }}:$MINOR-arm64

          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:$MAJOR \
            ${{ env.IMAGE_NAME }}:$MAJOR-amd64 \
            ${{ env.IMAGE_NAME }}:$MAJOR-arm64

      - name: Create manifests — dev
        if: matrix.flavor == 'dev' && needs.prepare.outputs.build_dev == 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:dev \
            ${{ env.IMAGE_NAME }}:dev-amd64 \
            ${{ env.IMAGE_NAME }}:dev-arm64

          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:master \
            ${{ env.IMAGE_NAME }}:master-amd64 \
            ${{ env.IMAGE_NAME }}:master-arm64
